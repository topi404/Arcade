<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arcade</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%23000'/><text x='6' y='24' font-size='22' fill='%2300ff41' font-family='monospace'>@</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Fira+Code&display=swap" rel="stylesheet">
<style>
/* Use locally installed FiraCode Nerd Font if available, else fall back to web Fira Code */
@font-face {
  font-family: 'FiraCode Nerd Font';
  src: local('FiraCode Nerd Font Mono'),
       local('FiraCode Nerd Font'),
       local('FiraCodeNFM-Reg'),
       local('FiraCode NF');
  font-weight: normal;
}
</style>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  background: #000;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'FiraCode Nerd Font', 'Fira Code', Consolas, monospace;
}

/* Scanlines */
body::before {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,0,0,.15) 2px, rgba(0,0,0,.15) 4px
  );
  pointer-events: none;
  z-index: 100;
}

#canvas {
  display: block;
  image-rendering: pixelated;
  cursor: none;
}

/* Score HUD */
#hud {
  position: fixed;
  top: 0; left: 0; right: 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 4px 12px;
  background: #000;
  border-bottom: 1px solid #222;
  font-size: 12px;
  font-family: 'FiraCode Nerd Font', 'Fira Code', Consolas, monospace;
  color: #555;
  z-index: 10;
  user-select: none;
}
#hud .hud-title { color: #888; letter-spacing: 2px; }
#hud .hud-score { color: #888; }
#hud .hud-hint  { color: #333; font-size: 10px; }
</style>
</head>
<body>

<div id="hud">
  <span class="hud-title">ARCADE</span>
  <span class="hud-score">Time: <b id="hudTime">0s</b> &nbsp; Speed: <b id="hudSpd">100ms</b></span>
  <span class="hud-hint">← → move &nbsp;·&nbsp; any other key = quit</span>
</div>

<canvas id="canvas"></canvas>

<script>
// ── Palette ──────────────────────────────────────────────
const PAL = [
  '#000000','#0000aa','#00aa00','#00aaaa',
  '#aa0000','#aa00aa','#aa5500','#888888',
  '#444444','#5555ff','#55ff55','#55ffff',
  '#ff5555','#ff55ff','#ffff55','#ffffff'
];

// ── CRT renderer ─────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');

let CW, CH, CellW, CellH;
let cells = [], fg = 7, bg = 0, cx = 1, cy = 1;

function calcSize() {
  const HUD  = 26;
  const avW  = window.innerWidth;
  const avH  = window.innerHeight - HUD;
  // Fixed 15px font — CellH = 17 (15 + 2px padding), CellW = 9 (Fira Code aspect ratio)
  CellH = 17;
  CellW = 9;
  CW    = Math.max(30, Math.floor(avW / CellW));
  CH    = Math.max(10, Math.floor(avH / CellH));
}

function initCells() {
  cells = Array.from({length: CH}, () =>
    Array.from({length: CW}, () => ({ch:' ', fg:7, bg:0})));
}

function renderCell(col, row) {
  const c = cells[row][col];
  const x = col * CellW, y = row * CellH;
  ctx.fillStyle = PAL[c.bg];
  ctx.fillRect(x, y, CellW, CellH);
  if (c.ch !== ' ') {
    ctx.fillStyle = PAL[c.fg];
    ctx.fillText(c.ch, x + 1, y + 1);
  }
}

function renderAll() {
  ctx.font = `15px 'FiraCode Nerd Font','Fira Code',Consolas,monospace`;
  ctx.textBaseline = 'top';
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  for (let r = 0; r < CH; r++)
    for (let c = 0; c < CW; c++)
      renderCell(c, r);
}

function put(ch) {
  if (cy < 1 || cy > CH || cx < 1 || cx > CW) return;
  cells[cy-1][cx-1] = {ch, fg, bg};
  renderCell(cx-1, cy-1);
  cx++;
  if (cx > CW) { cx = 1; cy++; }
}

function gxy(x, y) {
  cx = Math.max(1, Math.min(Math.round(x), CW));
  cy = Math.max(1, Math.min(Math.round(y), CH));
}

function clr() {
  cells = Array.from({length:CH}, () =>
    Array.from({length:CW}, () => ({ch:' ', fg:7, bg:0})));
  cx=1; cy=1; fg=7; bg=0;
  ctx.fillStyle='#000';
  ctx.fillRect(0,0,canvas.width,canvas.height);
}

function write(s) { for (const c of String(s)) put(c); }

// ── Live screen size (Pascal ScreenWidth / ScreenHeight) ─
const SW = () => CW;
const SH = () => CH;
const FLOOR_Y    = () => Math.floor(2 * SH() / 3);
const SPAWN_MAXY = () => Math.max(1, FLOOR_Y() - 10);

// ── Keyboard buffer ───────────────────────────────────────
let keyBuf = [];
document.addEventListener('keydown', e => {
  const nav = ['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '];
  if (nav.includes(e.key)) e.preventDefault();
  keyBuf.push(e);
});

function kpPressed() { return keyBuf.length > 0; }
function kpGet() {
  if (!keyBuf.length) return 0;
  const e = keyBuf.shift();
  if (e.key === 'ArrowLeft')  return -75;
  if (e.key === 'ArrowRight') return -77;
  if (e.key === 'ArrowUp')    return -72;
  if (e.key === 'ArrowDown')  return -80;
  if (e.key === 'Escape')     return 27;
  if (e.key === 'Enter')      return 13;
  if (e.key.length === 1)     return e.key.charCodeAt(0);
  return 0;
}

// ── Game ─────────────────────────────────────────────────
const MAX_OBJ   = 100;
const DEF_DELAY = 100;
const MAX_ITVL  = 5000;
const MIN_SPD   = 20;

let raf = null, scoreInt = null;

function startGame() {
  const objs = Array.from({length: MAX_OBJ}, () => ({x:1, y:1}));
  let posX = Math.floor(SW() / 2);
  let posY = FLOOR_Y() - 1;
  let dead = false;
  let spawnDelay = DEF_DELAY;
  let lastGrav   = Date.now();
  let lastSpeed  = Date.now();
  let startTime  = Date.now();

  // ── helpers ─────────────────────
  function drawFloor() {
    for (let i = 1; i <= SW(); i++) {
      gxy(i, FLOOR_Y()); fg = 7; put('-');
    }
  }

  function genObj(i) {
    objs[i].x = Math.floor(Math.random() * SW()) + 1;
    objs[i].y = Math.floor(Math.random() * SPAWN_MAXY()) + 1;
    fg = 7; gxy(objs[i].x, objs[i].y); put('*');
  }

  function remObj(i) { fg=0; gxy(objs[i].x,objs[i].y); put(' '); fg=7; }
  function drgObj(i) { fg=7; gxy(objs[i].x,objs[i].y); put('*'); }
  function flrObj(i) { fg=7; gxy(objs[i].x,objs[i].y); put('-'); }
  function hideP()   { fg=0; gxy(posX, posY); put(' '); fg=7; }
  function showP()   { fg=7; gxy(posX, posY); put('@'); }

  function moveP(dx) {
    if (posX + dx < 1 || posX + dx > SW()) return;
    hideP(); posX += dx; showP();
  }

  function handleInput() {
    if (!kpPressed()) return;
    const code = kpGet();
    if (code === 0) return;
    if (code > 0) { dead = true; return; }
    if (code === -75) moveP(-1);
    if (code === -77) moveP( 1);
  }

  function applyGravity() {
    for (let i = 0; i < MAX_OBJ; i++) {
      if (objs[i].y >= FLOOR_Y()) continue;
      remObj(i); objs[i].y++; drgObj(i);
    }
  }

  function checkCollisions() {
    for (let i = 0; i < MAX_OBJ; i++) {
      if (objs[i].y >= FLOOR_Y()) { remObj(i); flrObj(i); genObj(i); }
      if (objs[i].x === posX && objs[i].y === posY) dead = true;
    }
  }

  // ── init ────────────────────────
  clr();
  drawFloor();
  showP();
  for (let i = 0; i < MAX_OBJ; i++) genObj(i);
  renderAll();

  if (scoreInt) clearInterval(scoreInt);
  scoreInt = setInterval(() => {
    document.getElementById('hudTime').textContent = Math.floor((Date.now()-startTime)/1000)+'s';
    document.getElementById('hudSpd').textContent  = spawnDelay+'ms';
  }, 250);

  // ── game loop ────────────────────
  if (raf) cancelAnimationFrame(raf);

  function loop() {
    if (dead) {
      clearInterval(scoreInt);
      showGameOver(Math.floor((Date.now()-startTime)/1000));
      return;
    }

    handleInput();
    if (dead) { clearInterval(scoreInt); showGameOver(Math.floor((Date.now()-startTime)/1000)); return; }

    const now = Date.now();
    if (now - lastGrav  >= spawnDelay) { applyGravity(); lastGrav = now; }
    if (now - lastSpeed >= MAX_ITVL)   {
      if (spawnDelay >= MIN_SPD) spawnDelay -= 2;
      lastSpeed = now;
    }

    checkCollisions();
    if (!dead) showP();

    raf = requestAnimationFrame(loop);
  }

  raf = requestAnimationFrame(loop);
}

// ── Game Over screen ──────────────────────────────────────
function showGameOver(survived) {
  clr();
  const lines = [
    'GAME  OVER',
    '',
    'Survived:  ' + survived + 's',
    '',
    'Press any key to restart',
  ];
  const startRow = Math.floor(SH()/2) - Math.floor(lines.length/2);
  fg = 7;
  for (let i = 0; i < lines.length; i++) {
    const col = Math.max(1, Math.floor(SW()/2) - Math.floor(lines[i].length/2));
    gxy(col, startRow + i);
    write(lines[i]);
  }
  renderAll();

  setTimeout(() => {
    const h = () => {
      document.removeEventListener('keydown', h);
      keyBuf = [];
      startGame();
    };
    document.addEventListener('keydown', h);
  }, 500);
}

// ── Resize ────────────────────────────────────────────────
function onResize() {
  calcSize();
  canvas.width  = CW * CellW;
  canvas.height = CH * CellH;
  ctx.font = `15px 'FiraCode Nerd Font','Fira Code',Consolas,monospace`;
  ctx.textBaseline = 'top';
}

window.addEventListener('resize', () => {
  // Restart on resize so floor/objects recalculate for new screen size
  if (raf) cancelAnimationFrame(raf);
  if (scoreInt) clearInterval(scoreInt);
  keyBuf = [];
  onResize();
  initCells();
  startGame();
});

// ── Boot ──────────────────────────────────────────────────
onResize();
initCells();
startGame();
</script>
</body>
</html>
