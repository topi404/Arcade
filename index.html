<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free Pascal Online IDE</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%23050d05'/><text x='4' y='24' font-size='22' fill='%2300ff41' font-family='monospace'>P</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
<style>
:root {
  --green: #00ff41;
  --green-dim: #00aa2a;
  --amber: #ffb300;
  --red: #ff3131;
  --bg: #050d05;
  --bg2: #0a150a;
  --border: #1a3d1a;
  --glow: 0 0 8px #00ff4166;
}
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--green);
  font-family: 'Share Tech Mono', Consolas, monospace;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Scanlines */
body::before {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.12) 2px, rgba(0,0,0,.12) 4px);
  pointer-events: none;
  z-index: 9999;
}

/* ── Header ── */
header {
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
  background: var(--bg2); flex-shrink: 0;
}
.logo {
  font-family: 'VT323', monospace;
  font-size: 26px; color: var(--green);
  text-shadow: var(--glow); letter-spacing: 2px;
}
.logo span { color: var(--amber); }
.badges { display: flex; gap: 5px; flex-wrap: wrap; }
.badge {
  font-size: 9px; padding: 2px 6px;
  border: 1px solid; letter-spacing: .5px; text-transform: uppercase;
}
.bc { border-color: #55ffff; color: #55ffff; }
.bs { border-color: #ffff55; color: #ffff55; }
.bn { border-color: #55ff55; color: #55ff55; }
.bk { border-color: #ff55ff; color: #ff55ff; }
.header-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }

select {
  font-family: 'Share Tech Mono', Consolas, monospace;
  font-size: 11px; background: var(--bg2); color: var(--green-dim);
  border: 1px solid var(--border); padding: 3px 7px; cursor: pointer; outline: none;
}
select option { background: var(--bg2); }

/* ── Buttons ── */
.btn {
  font-family: 'Share Tech Mono', Consolas, monospace;
  font-size: 12px; padding: 5px 14px;
  border: 1px solid var(--green); background: transparent;
  color: var(--green); cursor: pointer;
  text-transform: uppercase; letter-spacing: 1px;
  transition: all .12s; position: relative; overflow: hidden;
}
.btn::before {
  content: ''; position: absolute; inset: 0;
  background: var(--green); transform: translateX(-100%); transition: .12s; z-index: -1;
}
.btn:hover { color: var(--bg); box-shadow: var(--glow); }
.btn:hover::before { transform: translateX(0); }
.btn-run { border-color: var(--amber); color: var(--amber); font-size: 13px; padding: 6px 18px; }
.btn-run::before { background: var(--amber); }
.btn-run:hover { color: var(--bg); box-shadow: 0 0 12px #ffb30066; }
.btn-stop { border-color: var(--red); color: var(--red); display: none; }
.btn-stop::before { background: var(--red); }
.btn-stop:hover { color: #fff; }
.btn-clr { border-color: #444; color: #555; }
.btn-clr::before { background: #555; }
.btn-clr:hover { color: #fff; }
.btn:disabled { opacity: .35; pointer-events: none; }

/* ── Layout ── */
.workspace { display: flex; flex: 1; overflow: hidden; }

.panel-editor {
  display: flex; flex-direction: column;
  width: 50%; border-right: 1px solid var(--border); min-width: 0;
}
.panel-terminal { display: flex; flex-direction: column; flex: 1; min-width: 0; }

.panel-header {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 12px; border-bottom: 1px solid var(--border);
  background: var(--bg2); font-size: 10px; color: var(--green-dim);
  letter-spacing: 1px; text-transform: uppercase; flex-shrink: 0;
}
.dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--green); box-shadow: var(--glow);
  animation: blink 2s infinite;
}
.dot.amber { background: var(--amber); box-shadow: 0 0 6px #ffb30099; }
.dot.off { background: #333; box-shadow: none; animation: none; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

/* ── Editor ── */
#code-editor {
  flex: 1; width: 100%; background: var(--bg); color: var(--green);
  font-family: 'Share Tech Mono', Consolas, monospace;
  font-size: 13px; line-height: 1.65;
  border: none; outline: none; resize: none;
  padding: 12px 16px; caret-color: var(--green);
  overflow-y: auto; tab-size: 2;
}
#code-editor::selection { background: #00ff4122; }

/* ── Terminal ── */
#crt-wrap {
  flex: 1; overflow: auto; background: #000;
  display: flex; align-items: flex-start; justify-content: flex-start;
}
canvas#crt-canvas { display: block; }

#ai-term {
  flex: 1; overflow-y: auto; padding: 10px 14px;
  font-size: 13px; line-height: 1.6;
  background: var(--bg); white-space: pre; display: none;
  font-family: 'Share Tech Mono', Consolas, monospace;
}

/* ── Toolbar ── */
.toolbar {
  display: flex; gap: 6px; align-items: center;
  padding: 6px 10px; border-top: 1px solid var(--border);
  background: var(--bg2); flex-shrink: 0;
}
.status { margin-left: auto; font-size: 10px; color: var(--green-dim); }

/* ── Score bar ── */
.score-bar {
  display: none; padding: 3px 12px;
  border-top: 1px solid var(--border); background: var(--bg2);
  font-size: 10px; color: var(--amber); gap: 16px; align-items: center;
  flex-shrink: 0;
}
.score-bar.on { display: flex; }

/* ── Stdin row ── */
.stdin-row {
  display: none; align-items: center; gap: 6px;
  padding: 5px 12px; border-top: 1px solid var(--border);
  background: var(--bg2); flex-shrink: 0;
}
.stdin-row.on { display: flex; }
.stdin-lbl { color: var(--amber); font-size: 12px; white-space: nowrap; }
#stdin-inp {
  flex: 1; background: transparent; border: none; outline: none;
  color: var(--amber); font-family: 'Share Tech Mono', Consolas, monospace;
  font-size: 12px; caret-color: var(--amber);
}
.rk-hint { color: #555; font-size: 11px; font-style: italic; display: none; }

/* ── Resize handle ── */
.resize-handle {
  width: 4px; background: var(--border);
  cursor: col-resize; flex-shrink: 0; transition: background .2s;
}
.resize-handle:hover { background: var(--green-dim); }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--border); }
::-webkit-scrollbar-thumb:hover { background: var(--green-dim); }

/* ── Key hint ── */
.key { display: inline-block; border: 1px solid #333; padding: 0 4px; font-size: 10px; color: #555; }
</style>
</head>

<div class="workspace">
  <!-- Editor -->
  <div class="panel-editor" id="editorPanel">
    <div class="panel-header"><div class="dot"></div>EDITOR · program.pas</div>
    <textarea id="code-editor" spellcheck="false">program Arcade;
uses crt, SysUtils;
const
    MaxObjects = 100;
    SpawnOffSet = 10;
    DefaultSpawnDelay = 100;
    MaxInterval = 5000;
    MinGameSpeed = 20;
    GameOverMessage = 'Game Over';

procedure GetKey(var code: integer);
var c: char;
begin
    c := ReadKey;
    if c = #0 then begin c := ReadKey; code := -ord(c) end
    else code := ord(c)
end;

type
    GameObjects = record x, y: integer; end;
    GameObjectsArray = array [1..MaxObjects] of GameObjects;

procedure HidePlayer(x, y: integer);
begin GotoXY(x, y); write(' '); GotoXY(1, 1) end;

procedure ShowPlayer(x, y: integer);
begin GotoXY(x, y); write('@'); GotoXY(1, 1) end;

procedure MovePlayer(var x, y: integer; dx: integer);
begin
    if (x + dx < 1) or (x + dx > ScreenWidth) then exit;
    HidePlayer(x, y); x := x + dx; ShowPlayer(x, y)
end;

procedure HandleInput(var posX, posY: integer; var GameOver: boolean);
var c: integer;
begin
    if KeyPressed then begin
        GetKey(c);
        if c > 0 then begin GameOver := true; exit end;
        case c of
            -75: MovePlayer(posX, posY, -1);
            -77: MovePlayer(posX, posY, 1)
        end
    end
end;

procedure ShowGameOver;
var x, y: integer;
begin
    clrscr;
    x := ScreenWidth div 2 - (length(GameOverMessage) div 2);
    y := ScreenHeight div 2;
    GotoXY(x, y); write(GameOverMessage); GotoXY(1, 1)
end;

function UpdateTimer(var LastTime: qword; Interval: integer): boolean;
begin
    if GetTickCount64 - LastTime >= Interval then
    begin UpdateTimer := true; LastTime := GetTickCount64 end
    else UpdateTimer := false
end;

procedure RemoveObject(var Objects: GameObjectsArray; i: integer);
begin GotoXY(Objects[i].x, Objects[i].y); write(' '); GotoXY(1,1) end;

procedure DrawObject(var Objects: GameObjectsArray; i: integer);
begin GotoXY(Objects[i].x, Objects[i].y); write('*'); GotoXY(1,1) end;

procedure DrawFloor(Objects: GameObjectsArray; i: integer);
begin GotoXY(Objects[i].x, Objects[i].y); write('-'); GotoXY(1,1) end;

procedure GenerateObject(var Objects: GameObjectsArray; i: integer);
begin
    Objects[i].x := random(ScreenWidth) + 1;
    Objects[i].y := random(2 * ScreenHeight div 3 - SpawnOffSet) + 1;
    DrawObject(Objects, i)
end;

procedure ApplyGravity(var Objects: GameObjectsArray);
var i: integer;
begin
    for i := 1 to MaxObjects do begin
        if Objects[i].y >= 2 * ScreenHeight div 3 then continue;
        RemoveObject(Objects, i); Objects[i].y := Objects[i].y + 1; DrawObject(Objects, i)
    end
end;

procedure CheckCollisions(var Objects: GameObjectsArray;
    posX, posY: integer; var GameOver: boolean);
var i: integer;
begin
    for i := 1 to MaxObjects do begin
        if Objects[i].y >= 2 * ScreenHeight div 3 then begin
            RemoveObject(Objects, i); DrawFloor(Objects, i); GenerateObject(Objects, i)
        end;
        if (Objects[i].x = posX) and (Objects[i].y = posY) then GameOver := true
    end
end;

var
    i, SpawnDelay: integer;
    LastTime, SpeedTime: qword;
    posX, posY: integer;
    Objects: GameObjectsArray;
    GameOver: boolean = false;
begin
    randomize; clrscr;
    SpawnDelay := DefaultSpawnDelay;
    LastTime := GetTickCount64; SpeedTime := GetTickCount64;
    posX := ScreenWidth div 2;
    posY := (2 * ScreenHeight div 3) - 1;
    for i := 1 to ScreenWidth do begin GotoXY(i, 2 * ScreenHeight div 3); write('-') end;
    GotoXY(posX, posY); write('@');
    for i := 1 to MaxObjects do begin GenerateObject(Objects, i); DrawObject(Objects, i) end;
    while not GameOver do begin
        HandleInput(posX, posY, GameOver);
        if UpdateTimer(LastTime, SpawnDelay) then ApplyGravity(Objects);
        if UpdateTimer(SpeedTime, MaxInterval) then
            if SpawnDelay >= MinGameSpeed then SpawnDelay := SpawnDelay - 2;
        CheckCollisions(Objects, posX, posY, GameOver);
        delay(1)
    end;
    ShowGameOver
end.</textarea>
    <div class="toolbar">
      <button class="btn btn-run" id="runBtn" onclick="runProgram()">▶ RUN</button>

<script>
// ═══════════════════════════════════════════════════════════
//  CRT CANVAS RENDERER
// ═══════════════════════════════════════════════════════════
const CRT_PAL = [
  '#000000','#0000aa','#00aa00','#00aaaa',
  '#aa0000','#aa00aa','#aa5500','#aaaaaa',
  '#555555','#5555ff','#55ff55','#55ffff',
  '#ff5555','#ff55ff','#ffff55','#ffffff'
];

let crtCells = [], crtFg = 7, crtBg = 0, crtCX = 1, crtCY = 1;
let CW = 0, CH = 0, CELLW = 9, CELLH = 16;
const canvas = document.getElementById('crt-canvas');
const ctx    = canvas.getContext('2d');

function crtCalcSize() {
  const wrap = document.getElementById('crt-wrap');
  const ww   = Math.max(200, wrap.clientWidth  - 4);
  const wh   = Math.max(100, wrap.clientHeight - 4);
  CELLH = Math.max(10, Math.min(18, Math.floor(wh / 25)));
  CELLW = Math.round(CELLH * 0.56);
  CW    = Math.max(30, Math.floor(ww / CELLW));
  CH    = Math.max(10, Math.floor(wh / CELLH));
}

function crtInitGrid() {
  crtCells = Array.from({length: CH}, () =>
    Array.from({length: CW}, () => ({ch:' ', fg:7, bg:0})));
}

function crtResize() {
  const oldCells = crtCells, oldW = CW, oldH = CH;
  crtCalcSize();
  crtCells = Array.from({length:CH}, (_, r) =>
    Array.from({length:CW}, (_, c) =>
      (oldCells && r < oldH && c < oldW) ? {...oldCells[r][c]} : {ch:' ', fg:7, bg:0}));
  crtCX = Math.min(crtCX, CW); crtCY = Math.min(crtCY, CH);
  canvas.width  = CW * CELLW;
  canvas.height = CH * CELLH;
  ctx.font = `${CELLH-2}px 'Share Tech Mono',Consolas,monospace`;
  ctx.textBaseline = 'top';
  crtRenderAll();
  document.getElementById('termLabel').textContent = 'TERMINAL · NATIVE CRT · ' + CW + '×' + CH;
}

function crtRenderCell(col, row) {
  const cell = crtCells[row][col];
  const x = col * CELLW, y = row * CELLH;
  ctx.fillStyle = CRT_PAL[cell.bg];
  ctx.fillRect(x, y, CELLW, CELLH);
  if (cell.ch !== ' ') {
    ctx.fillStyle = CRT_PAL[cell.fg];
    ctx.fillText(cell.ch, x + 1, y + 1);
  }
}

function crtRenderAll() {
  ctx.font = `${CELLH-2}px 'Share Tech Mono',Consolas,monospace`;
  ctx.textBaseline = 'top';
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  for (let r = 0; r < CH; r++)
    for (let c = 0; c < CW; c++)
      crtRenderCell(c, r);
}

function crtPut(ch) {
  if (crtCY < 1 || crtCY > CH || crtCX < 1 || crtCX > CW) return;
  const cell = crtCells[crtCY-1][crtCX-1];
  cell.ch = ch; cell.fg = crtFg; cell.bg = crtBg;
  crtRenderCell(crtCX-1, crtCY-1);
  crtCX++;
  if (crtCX > CW) { crtCX = 1; crtCY++; }
}

function crtWrite(s) { for (const ch of String(s)) crtPut(ch); }

function crtGotoXY(x, y) {
  crtCX = Math.max(1, Math.min(Math.round(x), CW));
  crtCY = Math.max(1, Math.min(Math.round(y), CH));
}

function crtClrScr() {
  crtCells = Array.from({length:CH}, () =>
    Array.from({length:CW}, () => ({ch:' ', fg:7, bg:0})));
  crtCX = 1; crtCY = 1; crtFg = 7; crtBg = 0;
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

// Live ScreenWidth / ScreenHeight (match Pascal CRT semantics)
const SW = () => CW;
const SH = () => CH;

// ═══════════════════════════════════════════════════════════
//  NATIVE GAME RUNTIME
// ═══════════════════════════════════════════════════════════
let keyBuf = [], gameRAF = null, gameRunning = false;
let scoreInt = null, gameStart = 0, redrawFloorFn = null;

function nativeKeyDown(e) {
  const nav = ['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '];
  if (nav.includes(e.key)) e.preventDefault();
  keyBuf.push(e);
}

function kpPressed() { return keyBuf.length > 0; }

function kpGet() {
  if (!keyBuf.length) return 0;
  const e = keyBuf.shift();
  if (e.key === 'ArrowLeft')  return -75;
  if (e.key === 'ArrowRight') return -77;
  if (e.key === 'ArrowUp')    return -72;
  if (e.key === 'ArrowDown')  return -80;
  if (e.key === 'Escape')     return 27;
  if (e.key === 'Enter')      return 13;
  if (e.key.length === 1)     return e.key.charCodeAt(0);
  return 0;
}

function runArcade() {
  const MAX_OBJ    = 100;
  const DEF_DELAY  = 100;
  const MAX_ITVL   = 5000;
  const MIN_SPD    = 20;
  const SPAWN_OFF  = 10;
  const FLOOR_Y    = () => Math.floor(2 * SH() / 3);
  const SPAWN_MAXY = () => Math.max(1, FLOOR_Y() - SPAWN_OFF);

  const objs = Array.from({length: MAX_OBJ}, () => ({x:1, y:1}));
  let posX = Math.floor(SW() / 2);
  let posY = FLOOR_Y() - 1;
  let gameOver = false;
  let spawnDelay = DEF_DELAY;
  let lastGrav = Date.now(), lastSpd = Date.now();
  gameStart = Date.now();

  // ── draw helpers ──────────────────────────────
  function drawFloor() {
    for (let i = 1; i <= SW(); i++) {
      crtGotoXY(i, FLOOR_Y()); crtFg = 8; crtPut('-');
    }
    crtFg = 7;
  }

  redrawFloorFn = () => {
    drawFloor();
    posX = Math.min(posX, SW());
    posY = FLOOR_Y() - 1;
    crtFg = 10; crtGotoXY(posX, posY); crtPut('@'); crtFg = 7;
    crtRenderAll();
  };

  function genObj(i) {
    objs[i].x = Math.floor(Math.random() * SW()) + 1;
    objs[i].y = Math.floor(Math.random() * SPAWN_MAXY()) + 1;
    crtFg = 12; crtGotoXY(objs[i].x, objs[i].y); crtPut('*'); crtFg = 7;
  }
  function remObj(i) { crtFg = 0; crtGotoXY(objs[i].x, objs[i].y); crtPut(' '); crtFg = 7; }
  function drgObj(i) { crtFg = 12; crtGotoXY(objs[i].x, objs[i].y); crtPut('*'); crtFg = 7; }
  function flrChr(i) { crtFg = 8; crtGotoXY(objs[i].x, objs[i].y); crtPut('-'); crtFg = 7; }
  function hideP()   { crtFg = 0; crtGotoXY(posX, posY); crtPut(' '); crtFg = 7; }
  function showP()   { crtFg = 10; crtGotoXY(posX, posY); crtPut('@'); crtFg = 7; }

  function moveP(dx) {
    if (posX + dx < 1 || posX + dx > SW()) return;
    hideP(); posX += dx; showP();
  }

  function handleInput() {
    if (!kpPressed()) return;
    const code = kpGet();
    if (code === 0) return;
    if (code > 0) { gameOver = true; return; }
    if (code === -75) moveP(-1);
    if (code === -77) moveP(1);
  }

  function applyGravity() {
    for (let i = 0; i < MAX_OBJ; i++) {
      if (objs[i].y >= FLOOR_Y()) continue;
      remObj(i); objs[i].y++; drgObj(i);
    }
  }

  function checkCollisions() {
    for (let i = 0; i < MAX_OBJ; i++) {
      if (objs[i].y >= FLOOR_Y()) { remObj(i); flrChr(i); genObj(i); }
      if (objs[i].x === posX && objs[i].y === posY) gameOver = true;
    }
  }

  function showGameOver() {
    crtClrScr();
    const msg1 = 'GAME OVER';
    const msg2 = 'Press any key to restart';
    const msg3 = 'Survived: ' + Math.floor((Date.now()-gameStart)/1000) + 's';
    crtFg = 12;
    crtGotoXY(Math.floor(SW()/2 - msg1.length/2), Math.floor(SH()/2) - 2);
    crtWrite(msg1);
    crtFg = 7;
    crtGotoXY(Math.floor(SW()/2 - msg3.length/2), Math.floor(SH()/2));
    crtWrite(msg3);
    crtFg = 8;
    crtGotoXY(Math.floor(SW()/2 - msg2.length/2), Math.floor(SH()/2) + 2);
    crtWrite(msg2);
    crtFg = 7;
    crtRenderAll();
    setTimeout(() => {
      const h = () => {
        document.removeEventListener('keydown', h);
        keyBuf = [];
        if (gameRunning) runArcade();
      };
      document.addEventListener('keydown', h);
    }, 400);
  }

  // ── init ──────────────────────────────────────
  crtClrScr();
  drawFloor();
  showP();
  for (let i = 0; i < MAX_OBJ; i++) genObj(i);
  crtRenderAll();

  scoreInt = setInterval(() => {
    if (!gameRunning) return;
    document.getElementById('scTime').textContent = Math.floor((Date.now()-gameStart)/1000)+'s';
    document.getElementById('scSpd').textContent  = spawnDelay+'ms';
  }, 250);

  // ── game loop ─────────────────────────────────
  function loop() {
    if (!gameRunning) return;
    if (gameOver) { clearInterval(scoreInt); showGameOver(); return; }

    handleInput();
    if (gameOver) { clearInterval(scoreInt); showGameOver(); return; }

    const now = Date.now();
    if (now - lastGrav >= spawnDelay) { applyGravity(); lastGrav = now; }
    if (now - lastSpd  >= MAX_ITVL)  { if (spawnDelay >= MIN_SPD) spawnDelay -= 2; lastSpd = now; }

    checkCollisions();
    if (!gameOver) showP();

    gameRAF = requestAnimationFrame(loop);
  }
  gameRAF = requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════════════════════
//  AI INTERPRETER (Claude API)
// ═══════════════════════════════════════════════════════════
let aiFg = 7, aiBg = 0, aiCX = 1, aiCY = 1, aiGrid = [];
const AI_COLS = 80, AI_ROWS = 40;

function aiInitGrid() {
  aiGrid = Array.from({length:AI_ROWS}, () =>
    Array.from({length:AI_COLS}, () => ({ch:' ',fg:7,bg:0})));
  aiCX=1; aiCY=1; aiFg=7; aiBg=0;
}

function aiPut(ch) {
  if (ch==='\n'){aiCY++;aiCX=1;return;}
  if (ch==='\r'){aiCX=1;return;}
  if (aiCY<1||aiCY>AI_ROWS||aiCX<1||aiCX>AI_COLS) return;
  aiGrid[aiCY-1][aiCX-1] = {ch, fg:aiFg, bg:aiBg};
  aiCX++; if (aiCX>AI_COLS){aiCX=1;aiCY++;}
}

function aiRender() {
  const el = document.getElementById('ai-term');
  el.innerHTML = '';
  let lastRow = 0;
  for (let r=0;r<aiGrid.length;r++)
    for (let c=0;c<AI_COLS;c++)
      if (aiGrid[r][c].ch !== ' ') lastRow = r;
  for (let r=0; r<=lastRow+1 && r<aiGrid.length; r++) {
    const line = document.createElement('div');
    line.style.minHeight = '1.6em';
    let cFg=-1,cBg=-1,cSpan=null,lCol=0;
    for (let c=0;c<AI_COLS;c++) if(aiGrid[r][c].ch!==' '||aiGrid[r][c].bg!==0) lCol=c;
    for (let c=0;c<=lCol;c++) {
      const cell = aiGrid[r][c];
      if (cell.fg!==cFg||cell.bg!==cBg) {
        cSpan = document.createElement('span');
        cSpan.style.color = CRT_PAL[cell.fg];
        if (cell.bg!==0) cSpan.style.background = CRT_PAL[cell.bg];
        cFg=cell.fg; cBg=cell.bg; line.appendChild(cSpan);
      }
      cSpan.textContent += cell.ch;
    }
    el.appendChild(line);
  }
  el.scrollTop = el.scrollHeight;
}

function aiSys(text) {
  const el = document.getElementById('ai-term');
  const d  = document.createElement('div');
  d.style.color = '#00aa2a'; d.textContent = text;
  el.appendChild(d); el.scrollTop = el.scrollHeight;
}

// ── AI input handling ──────────────────────────
let aiPendResolve = null, aiWaitKey = false;

function showStdin(mode) {
  const row  = document.getElementById('stdinRow');
  const inp  = document.getElementById('stdin-inp');
  const hint = document.getElementById('rkHint');
  const lbl  = document.getElementById('stdinLbl');
  if (mode === 'hidden') { row.classList.remove('on'); return; }
  row.classList.add('on');
  if (mode === 'readkey') {
    lbl.textContent = 'ReadKey>'; inp.style.display='none'; hint.style.display='';
    aiWaitKey = true; document.addEventListener('keydown', captureRK);
  } else {
    lbl.textContent = 'stdin>'; inp.style.display=''; hint.style.display='none';
    aiWaitKey = false; inp.value = ''; inp.focus();
  }
}

function captureRK(e) {
  if (!aiWaitKey) return;
  e.preventDefault();
  document.removeEventListener('keydown', captureRK);
  aiWaitKey = false; showStdin('hidden');
  const ch = e.key.length===1 ? e.key : (e.key==='Enter'?'\r':e.key==='Escape'?'\x1b':' ');
  if (ch.trim()) { aiPut(ch); aiPut('\n'); aiRender(); }
  if (aiPendResolve) { aiPendResolve(ch); aiPendResolve = null; }
}

function handleStdinKey(e) {
  if (e.key !== 'Enter') return;
  const val = document.getElementById('stdin-inp').value;
  showStdin('hidden');
  for (const ch of val) aiPut(ch); aiPut('\n'); aiRender();
  if (aiPendResolve) { aiPendResolve(val); aiPendResolve = null; }
}

const waitReadln  = () => new Promise(r => { aiPendResolve = r; showStdin('readln');  });
const waitReadKey = () => new Promise(r => { aiPendResolve = r; showStdin('readkey'); });

// ── AI output parser ───────────────────────────
async function processAI(text) {
  let i = 0;
  while (i < text.length) {
    if (text[i] === '[') {
      const end = text.indexOf(']', i);
      if (end !== -1) {
        const tag = text.slice(i+1, end);
        if (tag === 'NL')          { aiPut('\n'); i=end+1; aiRender(); continue; }
        if (tag === 'CLRSCR')      { aiInitGrid(); i=end+1; aiRender(); continue; }
        if (tag === 'INPUT_NEEDED'){ aiRender(); return {needsInput:'readln'}; }
        if (tag === 'READKEY')     { aiRender(); return {needsInput:'readkey'}; }
        if (tag === 'DONE')        { aiRender(); return {done:true}; }
        if (tag.startsWith('ERROR')) {
          aiRender();
          const m = text.slice(end+1).trim() || tag.slice(5).trim();
          const o = aiFg; aiFg=12;
          for (const c of ('\nERROR: '+m+'\n')) aiPut(c);
          aiFg=o; aiRender(); return {done:true, error:true};
        }
        if (tag.startsWith('TC:'))      { aiFg=parseInt(tag.slice(3))&15; i=end+1; continue; }
        if (tag.startsWith('BC:'))      { aiBg=parseInt(tag.slice(3))&15; i=end+1; continue; }
        if (tag.startsWith('GOTOXY:')) {
          const p=tag.slice(7).split(',');
          aiCX=Math.max(1,parseInt(p[0])||1); aiCY=Math.max(1,parseInt(p[1])||1);
          i=end+1; continue;
        }
        if (tag.startsWith('DELAY:')) { i=end+1; continue; }
      }
    }
    aiPut(text[i]); i++;
  }
  aiRender(); return {done:false};
}

// ── Claude API call ────────────────────────────
const AI_SYSTEM = `You are a Free Pascal 3.2.2 interpreter. Execute Pascal programs and emit ONLY their output using special markers. Never add explanations or prose.

MARKERS (exact):
- text: output directly (no quotes)
- Writeln newline: [NL]
- Write (no newline): output text, NO [NL]
- TextColor(n): [TC:n]   (n=0..15)
- TextBackground(n): [BC:n]
- ClrScr: [CLRSCR]
- GotoXY(x,y): [GOTOXY:x,y]
- Delay(ms): [DELAY:ms]
- Readln/Read pauses: [INPUT_NEEDED] then STOP
- ReadKey pauses: [READKEY] then STOP
- Done: [DONE]
- Error: [ERROR]description[DONE]

RULES:
1. Execute every statement, evaluate all expressions, loops, recursion correctly.
2. Writeln(a,b,c) → concatenate all values then [NL]. Write → no [NL].
3. Write(n:w) → right-align n in field of width w with spaces.
4. After "User input: val" → assign val to the Readln variable, continue execution.
5. After "ReadKey returned: 'ch'" → assign ch to the ReadKey result, continue.
6. SysUtils: IntToStr, StrToInt, StrToIntDef, FloatToStr, FormatFloat, IntToHex, UpperCase, LowerCase, Trim, TrimLeft, TrimRight, Format, Pos, Copy, Length, Delete, Insert, StringOfChar, Now, Date, Time, DateToStr, TimeToStr, DateTimeToStr, FormatDateTime.
7. Math: Abs, Sqr, Sqrt, Round, Trunc, Int, Frac, Sin, Cos, Tan, Exp, Ln, Pi, Power, Random, Randomize.
8. String ops: +, Length, Copy, Pos, Delete, Insert, UpCase, Chr, Ord, Concat.
9. CRT: TextColor, TextBackground, ClrScr, GotoXY, WhereX, WhereY, Delay (ignore timing).
10. case/of with ranges, repeat/until, while/do, for/to/downto, nested procedures — all correct.
11. Today's date for Now/Date/Time: March 19, 2026, 12:00:00.
12. Output NOTHING except markers and program text.`;

async function callClaude(messages) {
  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system: AI_SYSTEM,
      messages
    })
  });
  const d = await r.json();
  if (d.error) throw new Error(d.error.message);
  return d.content[0].text;
}

//  RUN / STOP CONTROLLER
// ═══════════════════════════════════════════════════════════
let isRunning = false, aiConv = [], stopped = false;

function isNativeCode(code) {
  return /GetTickCount64|KeyPressed/i.test(code);
}

function setRunUI(v) {
  isRunning = v;
  document.getElementById('runBtn').style.display  = v ? 'none' : '';
  document.getElementById('stopBtn').style.display = v ? ''     : 'none';
  document.getElementById('termDot').className = 'dot ' + (v ? 'amber' : 'off');
}

function setStatus(t) { document.getElementById('statusBar').textContent = t; }

async function runProgram() {
  if (isRunning) return;
  const code = document.getElementById('code-editor').value.trim();
  if (!code) return;

  stopped = false; isRunning = true;
  setRunUI(true);

  if (isNativeCode(code)) {
    // ── NATIVE MODE ──────────────────────────────
    setStatus('▶ Native CRT runtime');
    document.getElementById('ai-term').style.display = 'none';
    document.getElementById('crt-wrap').style.display = 'flex';
    canvas.style.display = 'block';
    document.getElementById('scoreBar').classList.add('on');
    showStdin('hidden');

    crtCalcSize(); crtInitGrid();
    canvas.width  = CW * CELLW;
    canvas.height = CH * CELLH;
    ctx.font = `${CELLH-2}px 'Share Tech Mono',Consolas,monospace`;
    ctx.textBaseline = 'top';
    crtClrScr();

    gameRunning = true; keyBuf = [];
    document.addEventListener('keydown', nativeKeyDown);
    document.getElementById('crt-wrap').focus();
    runArcade();

  } else {
    // ── AI MODE ──────────────────────────────────
    setStatus('⟳ AI interpreter…');
    document.getElementById('ai-term').style.display = 'block';
    document.getElementById('crt-wrap').style.display = 'none';
    canvas.style.display = 'none';
    document.getElementById('scoreBar').classList.remove('on');
    document.getElementById('termLabel').textContent = 'TERMINAL · AI INTERPRETER';

    document.getElementById('ai-term').innerHTML = '';
    aiInitGrid();
    aiSys('── Running program ──────────────────────────────');

    aiConv = [{role:'user', content:'Execute this Free Pascal program:\n\n'+code}];

    try {
      while (!stopped) {
        const resp = await callClaude(aiConv);
        if (stopped) break;
        aiConv.push({role:'assistant', content: resp});
        const res = await processAI(resp);
        if (stopped) break;
        if (res.needsInput === 'readln') {
          const val = await waitReadln();
          if (stopped) break;
          aiConv.push({role:'user', content:'User input: '+val+'\nContinue from after Readln.'});
        } else if (res.needsInput === 'readkey') {
          const ch = await waitReadKey();
          if (stopped) break;
          aiConv.push({role:'user', content:"ReadKey returned: '"+ch+"'\nContinue from after ReadKey."});
        } else { break; }
      }
    } catch(e) {
      const o=aiFg; aiFg=12;
      for (const c of ('\nSystem error: '+e.message+'\n')) aiPut(c);
      aiFg=o; aiRender();
    }

    if (!stopped) {
      const o=aiFg; aiFg=2;
      for (const c of '\n── Program finished ──────────────────────────\n') aiPut(c);
      aiFg=o; aiRender();
      setStatus('Done');
    }
    showStdin('hidden');
    setRunUI(false); isRunning = false;
  }
}

function stopProgram() {
  stopped = true; gameRunning = false;
  if (gameRAF)  { cancelAnimationFrame(gameRAF); gameRAF = null; }
  if (scoreInt) { clearInterval(scoreInt); scoreInt = null; }
  document.removeEventListener('keydown', nativeKeyDown);
  document.removeEventListener('keydown', captureRK);
  keyBuf = [];
  if (aiPendResolve) { aiPendResolve('\x1b'); aiPendResolve = null; }
  showStdin('hidden');
  setRunUI(false); isRunning = false;

  if (canvas.style.display !== 'none') {
    const msg = '[ Stopped ]';
    crtFg = 12;
    crtGotoXY(Math.floor(SW()/2 - msg.length/2), Math.floor(SH()/2));
    crtWrite(msg); crtFg = 7; crtRenderAll();
  }
  setStatus('Stopped');
}

function clearTerminal() {
  crtClrScr(); crtRenderAll();
  document.getElementById('ai-term').innerHTML = '';
  aiInitGrid();
}
